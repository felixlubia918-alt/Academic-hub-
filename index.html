<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic AI Hub | Study & Quiz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --blue: #004a99; --green: #28a745; --light: #f4f7f6; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 0; }
        .navbar { background: var(--blue); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Wallet & Header */
        .wallet-bar { background: var(--gold); padding: 10px; border-radius: 10px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        
        /* Buttons */
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .btn-study { background: var(--blue); color: white; }
        .btn-quiz { background: #6f42c1; color: white; }
        .btn-pay { background: var(--green); color: white; }

        /* Content Area */
        #content-box { line-height: 1.6; text-align: left; display: none; }
        .quiz-option { display: block; background: #eee; padding: 10px; margin: 5px 0; border-radius: 5px; cursor: pointer; border: 1px solid #ccc; }
        .quiz-option:hover { background: #ddd; }
        #status { font-style: italic; color: #666; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <h2 style="margin:0;">Academic AI Hub 🎓</h2>
</div>

<div class="container">
    <div class="wallet-bar">My Balance: KES <span id="userBalance">0</span></div>
    
    <div class="card">
        <h3>Research a Topic</h3>
        <input type="text" id="topicInput" placeholder="Enter topic (e.g. Civil Law Notes)">
        
        <button class="btn btn-study" onclick="generateAction('study')">📖 Study Now (Free)</button>
        <button class="btn btn-quiz" onclick="generateAction('quiz')">📝 Take Quiz (Free)</button>
        <button class="btn btn-pay" onclick="payAndDownload()">📥 Download PDF Guide (15/-)</button>
        
        <div id="status">Researching your topic...</div>
    </div>

    <div id="display-card" class="card" style="display:none;">
        <div id="content-box"></div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    const API_KEY = "YOUR_GEMINI_API_KEY_HERE";
    let currentAIResult = ""; 
    let balance = parseInt(localStorage.getItem('academic_hub_balance')) || 0;
    document.getElementById('userBalance').innerText = balance;

    // --- 2. CORE AI ENGINE ---
    async function generateAction(type) {
        const topic = document.getElementById('topicInput').value;
        if (!topic) return alert("Please enter a topic first!");

        const status = document.getElementById('status');
        const display = document.getElementById('display-card');
        const contentBox = document.getElementById('content-box');
        
        status.style.display = "block";
        display.style.display = "none";
        contentBox.innerHTML = "";

        let prompt = "";
        if (type === 'study') {
            prompt = `Provide a detailed study guide for the topic: ${topic}. Break it down into Introduction, Key Facts, and a Summary. Use simple language.`;
        } else {
            prompt = `Create a 3-question multiple-choice quiz about: ${topic}. Format it like this: Question | Option A | Option B | Option C | Correct Answer.`;
        }

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            currentAIResult = data.candidates[0].content.parts[0].text;
            
            status.style.display = "none";
            display.style.display = "block";
            contentBox.style.display = "block";
            
            // Render result
            contentBox.innerText = currentAIResult;
        } catch (e) {
            alert("Error connecting to AI. Check your internet or API key.");
            status.style.display = "none";
        }
    }

    // --- 3. PAY & DOWNLOAD LOGIC ---
    function payAndDownload() {
        const topic = document.getElementById('topicInput').value;
        if (!currentAIResult) return alert("Please study or quiz the topic first!");
        
        if (balance >= 15) {
            balance -= 15;
            localStorage.setItem('academic_hub_balance', balance);
            document.getElementById('userBalance').innerText = balance;
            
            downloadPDF(topic);
        } else {
            alert("Insufficient Balance! Please top up your wallet to download.");
        }
    }

    function downloadPDF(topic) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Academic Hub: " + topic, 10, 20);
        doc.setFontSize(11);
        const splitText = doc.splitTextToSize(currentAIResult, 180);
        doc.text(splitText, 10, 40);
        doc.save(topic + "_Notes.pdf");
        alert("PDF Downloaded successfully!");
    }

    // Helpful for testing: type 'addMoney(100)' in browser console to add credits
    function addMoney(amt) {
        balance += amt;
        localStorage.setItem('academic_hub_balance', balance);
        document.getElementById('userBalance').innerText = balance;
    }
</script>

</body>
</html>
